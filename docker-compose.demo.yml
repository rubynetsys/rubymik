name: rubymikdemo

# The public demo (demo.rubymik.com) — its OWN project + network, ZERO shared
# volumes. `demonet` is `internal: true`: the demo app and the CHR it manages have
# NO route to the LAN, other docker networks, or the internet. That isolated network
# is the entire blast radius — an attacker who fully owns the demo container reaches
# the CHR and nothing else.
services:
  demo:
    image: ${RUBYMIK_IMAGE:-ghcr.io/rubynetsys/rubymik:latest}
    container_name: rubymik-demo
    restart: unless-stopped
    environment:
      RUBYMIK_DEMO_MODE: "1"                 # shows the resets-nightly banner + login "Try the demo" card
      RUBYMIK_POLL_INTERVAL: "30"
      RUBYMIK_UPDATE_URL: ""                  # isolated net → no update check
      # The login card advertises the VIEWER login. SINGLE SOURCE = .env: the same two vars
      # feed both this container (what the card shows) and the seed (scripts/reset-demo.sh,
      # which sources .env) — so a password change updates both together, never one alone.
      RUBYMIK_DEMO_VIEWER_EMAIL: ${RUBYMIK_DEMO_VIEWER_EMAIL:-demo@rubymik.com}
      RUBYMIK_DEMO_VIEWER_PASS: ${RUBYMIK_DEMO_VIEWER_PASS:-rubymik-demo}
      RUBYMIK_BACKUP_KEY: ${RUBYMIK_BACKUP_KEY:-}   # set in .env → self-backups on (no "backups off" warning)
      # Real admin credential is random + set by the seed (held by Ray only).
    volumes:
      - demo-data:/data                       # dedicated volume, wiped nightly
    # No published port: demonet is `internal: true`, so host port-publishing does not
    # wire up. The tunnel reaches the app at demo:8080 over demonet; local admin/seed
    # access is via the container's demonet bridge IP (host↔container on the bridge is
    # unaffected by `internal`, which only removes the container's route OUT).
    networks: [demonet]

  router:
    # SYNTHETIC RouterOS REST responder — the ONE live device the demo manages. Reuses
    # the RubyMIK image to run a tiny read-only `/rest/*` server (server/src/devtools/
    # demo-router.ts). Needs no KVM / /dev/net/tun / default route, so it runs happily on
    # the `internal: true` net where the qemu CHR cannot. The demo device is seeded to
    # host `router` port 8080 (http). Manages ZERO real devices — this is fabricated data.
    image: ${RUBYMIK_IMAGE:-ghcr.io/rubynetsys/rubymik:latest}
    container_name: rubymik-demo-router
    restart: unless-stopped
    command: ["node", "dist/devtools/demo-router.js"]
    environment:
      PORT: "8080"
      DEMO_ROUTER_IDENTITY: "zzz-demo-gw"
    healthcheck:   # override the app healthcheck (this container serves /rest, not /api)
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/rest/system/identity').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 5s
    networks: [demonet]

  chr:
    # RouterOS CHR — INCOMPATIBLE with this demo's `internal: true` blast-radius network:
    # its entrypoint (generate-dhcpd-conf.py) requires a DEFAULT ROUTE on the container's
    # network, which `internal: true` deliberately denies (→ "ValueError: no default
    # route"), and it needs /dev/net/tun (absent here) plus /dev/kvm (absent → slow TCG).
    # Left profile-gated so it NEVER starts by default. A live demo device that honours the
    # internal net must be a synthetic RouterOS-REST responder container ON demonet (needs
    # no default route) — see docs/P41-PENDING-RAY.md. Do NOT enable `--profile chr` here.
    image: evilfreelancer/docker-routeros:7.15
    container_name: rubymik-demo-chr
    restart: unless-stopped
    cap_add: [NET_ADMIN]
    # devices: ["/dev/kvm"]                   # uncomment on a KVM-capable host
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 640M } # cap TCG so it can't starve other services
    networks: [demonet]
    profiles: [chr]

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: rubymik-demo-tunnel
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${RUBYMIK_DEMO_TUNNEL_TOKEN:-}
      TUNNEL_TRANSPORT_PROTOCOL: http2        # QUIC fails on this host's bridge
    networks: [demonet, tunnelnet]            # demonet to reach demo:8080, tunnelnet for Cloudflare
    depends_on: [demo]
    profiles: [tunnel]

volumes:
  demo-data:

networks:
  demonet:
    internal: true      # the blast radius: no LAN / other-network / internet route
  tunnelnet:            # only the tunnel touches this (outbound to Cloudflare)
    # created only when the `tunnel` profile is active (the sole service that uses it)
