# No hard-coded `name:` on purpose. The Compose project name defaults to THIS
# directory's name, so a copy of this file in a different directory gets its OWN
# isolated volumes — a second instance can never silently attach (and `down -v`
# can never wipe) another install's data. Run each instance from its own directory;
# to run two on one host, give the second a different dir AND a different
# `container_name` + host ports. See README-DEPLOY.md § Running more than one instance.
services:
  rubymik:
    # The published image. `docker compose pull && docker compose up -d` updates it.
    # Override RUBYMIK_IMAGE to pin a specific version tag or a locally-built image.
    image: ${RUBYMIK_IMAGE:-ghcr.io/rubynetsys/rubymik:latest}
    # A fixed container name so `docker exec rubymik …` works and a naive second
    # instance fails LOUDLY on the name clash instead of silently sharing state.
    container_name: rubymik
    restart: unless-stopped
    init: true
    ports:
      - "${RUBYMIK_PORT:-8080}:8080"
      # WebFig reverse proxy (router admin UIs). Must be browser-reachable, like
      # the main port. Set RUBYMIK_WEBFIG_PORT=0 to disable the feature.
      - "${RUBYMIK_WEBFIG_PORT:-8081}:8081"
    environment:
      RUBYMIK_LOG_LEVEL: ${RUBYMIK_LOG_LEVEL:-info}
      RUBYMIK_WEBFIG_PORT: 8081
      RUBYMIK_POLL_INTERVAL: ${RUBYMIK_POLL_INTERVAL:-30}
      RUBYMIK_BACKUP_INTERVAL: ${RUBYMIK_BACKUP_INTERVAL:-86400}
      RUBYMIK_BACKUP_KEEP: ${RUBYMIK_BACKUP_KEEP:-10}
      # Field-encryption key. Empty ⇒ RubyMIK generates one at /data/secret.key on
      # first run (persisted in the volume). Set it to manage the key yourself.
      # Read from the environment (a gitignored .env or the shell) — NEVER baked in.
      RUBYMIK_ENCRYPTION_KEY: ${RUBYMIK_ENCRYPTION_KEY:-}
      # P36 DB self-backup key — dedicated, NEVER hardcoded here; read from a
      # gitignored .env (or the shell). Unset ⇒ self-backups disabled AND a schema
      # upgrade refuses to run (P38 fail-closed: no backup, no migration).
      RUBYMIK_BACKUP_KEY: ${RUBYMIK_BACKUP_KEY:-}
      RUBYMIK_SELFBACKUP_INTERVAL: ${RUBYMIK_SELFBACKUP_INTERVAL:-21600}
      RUBYMIK_SELFBACKUP_KEEP: ${RUBYMIK_SELFBACKUP_KEEP:-28}
      # P38 update check — optional URL override (or turn it off in the app).
      RUBYMIK_UPDATE_URL: ${RUBYMIK_UPDATE_URL:-}
      # P39 — set when behind a TLS-terminating reverse proxy (see README-DEPLOY §4b).
      # Never expose the port below raw to the internet.
      RUBYMIK_TRUST_PROXY: ${RUBYMIK_TRUST_PROXY:-}
      # P40 — base URL for password-reset links in emails (else the request's host).
      RUBYMIK_PUBLIC_URL: ${RUBYMIK_PUBLIC_URL:-}
    volumes:
      - rubymik-data:/data
      # A SECOND, separate volume as the off-host copy stand-in (a mounted path).
      # Real off-host destination (SFTP/rclone/mounted share) is PENDING-RAY.
      - rubymik-offhost:/offhost

volumes:
  rubymik-data:
  rubymik-offhost:
